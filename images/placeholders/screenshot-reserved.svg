  <rect width="1280" height="720" fill="var(--background)" />
  <rect x="24" y="24" width="1232" height="672" rx="24" fill="var(--panel)" stroke="var(--border)" stroke-width="2" />
  <g transform="translate(640 286)" fill="none" stroke="var(--icon)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round">
